<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monopoly 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading">Preparando el tablero…</div>

<div id="canvas-wrap"></div>

<div id="top-bar">
  <div id="hint">Arrastra para girar · rueda para zoom · "F" pantalla completa · "SPACE" tirar dado</div>
</div>

<div id="big-number">4</div>

<div id="hud">
  <div class="panel" id="controls-panel">
    <div id="turn-info">
      <h3>Turno</h3>
      <div class="players-row" id="players-row"></div>
    </div>
    <div id="dice-result"></div>
    <button id="roll-btn" type="button">🎲 Tirar dado</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>
</body>
</html>
